<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title class="font-mont align-center">Search</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
<div class="animate__animated">
  <ion-list lines="none">

    <ion-radio-group>
               <ion-list-header>
                 <ion-label>Where do you want to search</ion-label>
               </ion-list-header>
               <ion-item>
                 <ion-label>Categories</ion-label>
                 <ion-radio slot="start" color="danger" (click)="choose('category')"></ion-radio>
               </ion-item>

               <ion-item>
                 <ion-label>Houses</ion-label>
                 <ion-radio slot="start" color="danger" (click)="choose('houses')"></ion-radio>
               </ion-item>
             </ion-radio-group>

<div [ngClass]="(data?.selected)?'animate__animated':'none'">
      <ion-item *ngIf="data.type!='category'">
        <ion-label>Pick a category: </ion-label>
        <ion-select placeholder="Select house category" [interfaceOptions]="customActionSheetOptions" interface="action-sheet" [(ngModel)]="data.search.category">
          <ion-select-option value="{{item.id}}" *ngFor="let item of data.categories"  >{{item.name}}</ion-select-option>
          </ion-select>
        </ion-item>

        <ion-item>
          <ion-label>Search query: </ion-label>
          <ion-input class="font-mont" placeholder="Enter what you're looking for" [(ngModel)]="data.search.input"></ion-input>
          </ion-item>
          </div>
    </ion-list>
</div>
</ion-content>

<ion-footer class="ion-no-border">
  <ion-toolbar>
    <div class="padding-lr-sm flex-full">
        <ion-button size="medium" (click)="close()">Cancel</ion-button>
      <ion-button color="light" size="medium" (click)="proceed()">Proceed</ion-button>
    </div>
  </ion-toolbar>
</ion-footer>
